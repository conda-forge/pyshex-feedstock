{% set name = "pyshex" %}
{% set version = "0.9.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 87288b5e5613f734f55f0085334558218ff618fb1061aabdcee19841092b3eca

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  entry_points:
    - shexeval = pyshex.shex_evaluator:evaluate_cli

requirements:
  host:
    - python {{ python_min }}
    - pbr
    - pip
  run:
    - python >={{ python_min }}
    - cfgraph >=0.2.1
    - chardet
    - pyshexc ==0.9.1
    - rdflib-shim
    - requests >=2.22.0
    - shexjsg >=0.8.2
    - sparqlslurper >=0.5.1
    - sparqlwrapper >=1.8.5
    - urllib3

test:
  imports:
    - pyshex
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/hsolbrig/PyShEx
  summary: Python ShEx Implementation
  license: CC0-1.0
  license_file: license.txt

extra:
  recipe-maintainers:
    - jfy133
